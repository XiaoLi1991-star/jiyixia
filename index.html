<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>记一下</title>
    <script>
      window.Capacitor = window.Capacitor || {};
      window.Capacitor.triggerEvent = window.Capacitor.triggerEvent || function (eventName, target, eventData) {
        var receiver = target === 'window' ? window : document;
        receiver.dispatchEvent(new CustomEvent(eventName, { detail: eventData }));
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
